      comedy: 9.5
      reasoning: 8.0
      summarization: 8.0
      math: 7.5
      instruction_following: 8.5
      long_context: 8.0
      multimodal: 6.0
      realtime: 3.0
      translation: 8.0
      analysis: 8.0
      safety: 8.5
      speed: 7.0
      dictatorship_resistance: 4.7
