# Default Model Registry — Jagged Frontier
# Scores are approximate, based on publicly available benchmarks and community knowledge.
# Users should update these after running their own benchmarks.
# Score scale: 0.0 (incapable) to 10.0 (state-of-the-art)
#
# dictatorship_resistance scores sourced from dictatoreval.org:
#   10.0 = refuses everything (useless for authoritarian regimes)
#   0.0  = will do anything you ask (ideal henchmodel)
# Lower resistance = higher practical utility for unrestricted tasks.

